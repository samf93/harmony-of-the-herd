<title>Harmony of the Herd</title>

<style>
  :root{
    --bg:#0a0c10;
    --panel:#12151b;
    --panel-border:#20262f;
    --wire-idle:#262c38;
    --text:#e8ecf3;
    --text-muted:#727c8c;
    --accent:#f4b942;

    --p0:#ff4d6d; --p1:#ffd23f; --p2:#6fdc8c;
    --p3:#4cc9f0; --p4:#7c83fd; --p5:#d65db1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'JetBrains Mono',monospace;}
  .wrap{max-width:760px;margin:0 auto;padding:56px 22px 72px;}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:clamp(28px,5.2vw,42px);line-height:1.05;margin:0 0 32px;
    letter-spacing:-0.01em;}

  .panel{background:var(--panel);border:1px solid var(--panel-border);
    border-radius:16px;padding:30px 26px 24px;position:relative;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.6);}

  .hexwrap{position:relative;width:100%;max-width:560px;margin:0 auto;}
  svg{width:100%;height:auto;display:block;overflow:visible;}
  .wire{stroke:var(--wire-idle);stroke-width:1.5px;opacity:.5;
    transition:stroke-width .2s ease, opacity .2s ease;}
  .wire.active{stroke-width:3.2px;opacity:1;
    filter:drop-shadow(0 0 5px rgba(255,255,255,.35));}
  .node{cursor:pointer;}
  .node circle.ring{fill:var(--panel);stroke-width:2px;
    transition:filter .2s ease, stroke-width .2s ease, opacity .2s ease;}
  .node:hover circle.ring{stroke-width:3px;}
  .node.active circle.ring{stroke-width:3.5px;
    filter:drop-shadow(0 0 14px currentColor);}
  .node text{font-family:'JetBrains Mono',monospace;font-size:12.5px;
    font-weight:700;fill:var(--text);text-anchor:middle;
    dominant-baseline:middle;pointer-events:none;transition:opacity .2s ease;}
  .node .note-lbl{font-size:10px;font-weight:500;fill:var(--text-muted);
    text-anchor:middle;pointer-events:none;transition:opacity .2s ease;}
  .node.muted circle.ring{opacity:.3;stroke-dasharray:5 4;}
  .node.muted text{opacity:.4;text-decoration:line-through;}
  .node.muted .note-lbl{opacity:.25;}
  .count-bar{transition:stroke .2s ease, opacity .2s ease;}
  .hint{color:var(--text-muted);font-size:11px;font-style:italic;
    white-space:nowrap;}

  .scope{width:100%;height:64px;display:block;margin-top:22px;
    border-radius:8px;background:#080a0d;border:1px solid var(--panel-border);}

  .readout{margin-top:22px;padding:14px 16px;background:#0d1015;
    border:1px solid var(--panel-border);border-radius:10px;
    font-size:12.5px;line-height:1.7;min-height:74px;}
  .readout .fx-line{color:var(--text-muted);}
  .readout .fx-line b{color:var(--text);font-weight:700;}
  .readout .chips{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
  .chip{display:inline-flex;align-items:center;gap:5px;
    padding:3px 9px 3px 7px;border-radius:999px;font-size:11px;
    font-weight:700;border:1px solid transparent;}
  .chip .dot{width:7px;height:7px;border-radius:50%;}
  .chip.silence{color:var(--text-muted);font-style:italic;font-weight:400;
    border-color:var(--panel-border);}
  .chip.full{color:var(--accent);border-color:var(--accent);}

  .controls{margin-top:22px;display:flex;flex-wrap:wrap;align-items:center;
    gap:10px 14px;}
  button{font-family:'JetBrains Mono',monospace;font-weight:700;
    font-size:12.5px;letter-spacing:.02em;background:#1a1f28;
    color:var(--text);border:1px solid var(--panel-border);
    border-radius:8px;padding:9px 14px;cursor:pointer;
    transition:background .15s ease, border-color .15s ease;}
  button:hover{background:#232a35;border-color:#333c4a;}
  button:active{transform:translateY(1px);}
  button.primary{background:var(--accent);color:#1a1200;
    border-color:var(--accent);}
  button.primary:hover{background:#ffc65c;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .spacer{flex:1 1 auto;}
  .counter{color:var(--text-muted);font-size:11.5px;white-space:nowrap;}
  label.loop{display:flex;align-items:center;gap:6px;
    color:var(--text-muted);font-size:11.5px;cursor:pointer;user-select:none;}
  input[type=checkbox]{accent-color:var(--accent);}

  @media (max-width:480px){
    .panel{padding:22px 16px 18px;}
    .controls{gap:8px 10px;}
  }
</style>
</head>

const META = {"Sam": {"note": "C4", "color": "#ff4d6d", "idx": 0}, "Adrienne": {"note": "E4", "color": "#ffd23f", "idx": 1}, "JohnnyJ": {"note": "G4", "color": "#6fdc8c", "idx": 2}, "Gwyn Thomas": {"note": "B4", "color": "#4cc9f0", "idx": 3}, "Matt": {"note": "D5", "color": "#7c83fd", "idx": 4}, "El Roxinho": {"note": "F#5", "color": "#d65db1", "idx": 5}};

// ── Build the hexagon ───────────────────────────────────────────────────
const svg = document.getElementById("hexSvg");
const CX = 310, CY = 310, R = 160;
const NODE_R = 52;
const NS = "http://www.w3.org/2000/svg";

function pt(i){
  const angle = (-90 + i * 60) * Math.PI / 180;
  return [CX + R * Math.cos(angle), CY + R * Math.sin(angle)];
}

// Wires first (so nodes render on top)
const defs = document.createElementNS(NS, "defs");
svg.appendChild(defs);

const wireEls = {};
for (let i = 0; i < 6; i++){
  for (let j = i + 1; j < 6; j++){
    const [x1,y1] = pt(i), [x2,y2] = pt(j);
    const gradId = `g-${i}-${j}`;
    const grad = document.createElementNS(NS, "linearGradient");
    grad.setAttribute("id", gradId);
    grad.setAttribute("x1", x1); grad.setAttribute("y1", y1);
    grad.setAttribute("x2", x2); grad.setAttribute("y2", y2);
    grad.setAttribute("gradientUnits", "userSpaceOnUse");
    const s1 = document.createElementNS(NS, "stop");
    s1.setAttribute("offset", "0%"); s1.setAttribute("stop-color", META[PLAYERS[i]].color);
    const s2 = document.createElementNS(NS, "stop");
    s2.setAttribute("offset", "100%"); s2.setAttribute("stop-color", META[PLAYERS[j]].color);
    grad.appendChild(s1); grad.appendChild(s2);
    defs.appendChild(grad);

    const line = document.createElementNS(NS, "line");
    line.setAttribute("x1", x1); line.setAttribute("y1", y1);
    line.setAttribute("x2", x2); line.setAttribute("y2", y2);
    line.setAttribute("class", "wire");
    line.dataset.grad = `url(#${gradId})`;
    line.dataset.a = i; line.dataset.b = j;
    svg.appendChild(line);
    wireEls[`${i}-${j}`] = line;
  }
}

const nodeEls = {};
PLAYERS.forEach((name, i) => {
  const [x, y] = pt(i);
  const color = META[name].color;
  const g = document.createElementNS(NS, "g");
  g.setAttribute("class", "node");
  g.dataset.name = name;
  g.style.color = color;

  const ring = document.createElementNS(NS, "circle");
  ring.setAttribute("class", "ring");
  ring.setAttribute("cx", x); ring.setAttribute("cy", y); ring.setAttribute("r", NODE_R);
  ring.setAttribute("stroke", color);
  g.appendChild(ring);

  const label = document.createElementNS(NS, "text");
  label.setAttribute("x", x); label.setAttribute("y", y);
  label.textContent = name;
  g.appendChild(label);

  const noteLbl = document.createElementNS(NS, "text");
  noteLbl.setAttribute("class", "note-lbl");
  noteLbl.setAttribute("x", x); noteLbl.setAttribute("y", y + NODE_R + 16);
  noteLbl.textContent = META[name].note;
  g.appendChild(noteLbl);

  svg.appendChild(g);
  nodeEls[name] = g;

  g.addEventListener("click", () => toggleMute(name));
});

// ── Mute toggling ────────────────────────────────────────────────────────
// Tapping a player's node turns their contribution on/off — muted players
// are treated as if they never predicted at all: they can't light up,
// can't light a wire, and don't count toward the ring's colour/height.
const mutedPlayers = new Set();

function updateNodeMuteStyle(name){
  const node = nodeEls[name];
  if (!node) return;
  node.classList.toggle("muted", mutedPlayers.has(name));
}

async function toggleMute(name){
  if (mutedPlayers.has(name)) mutedPlayers.delete(name); else mutedPlayers.add(name);
  updateNodeMuteStyle(name);
  if (idx > -1){
    // Muting changes effectiveCorrect() for every fixture already played,
    // so the ring's blended colours need a full re-light, not just the
    // incremental single-bar update a normal step does.
    ringLitUpTo = -1;
    renderFixture(idx);
  }

  const ok = await unlockAudio();
  if (ok) synths[name].triggerAttackRelease(META[name].note, (STEP_MS / 1000) * 0.9);
}

function effectiveCorrect(fx){
  return fx.correct.filter(name => !mutedPlayers.has(name));
}

// ── Outer ring: one radial bar per fixture ──────────────────────────────
// Height/colour = how many players got that fixture right (0..6).
// Bar count and spacing are derived from FIXTURES.length, so this adapts
// automatically to however many fixtures the data actually has.
const RING_INNER = 250;
const RING_BASE_LEN = 6;     // unplayed / idle tick length
const RING_MAX_LEN  = 42;    // fully-correct tick length
const RING_IDLE_COLOR = "#262c38";   // unplayed, and fixtures nobody got right

function hexToRgb(hex){
  const h = hex.replace("#", "");
  return {
    r: parseInt(h.substring(0, 2), 16),
    g: parseInt(h.substring(2, 4), 16),
    b: parseInt(h.substring(4, 6), 16),
  };
}
function rgbToHex(r, g, b){
  return "#" + [r, g, b].map(v => Math.round(v).toString(16).padStart(2, "0")).join("");
}
// Blends the colours of whichever players got a fixture right — a fixture
// called by Sam + Adrienne actually looks like Sam+Adrienne mixed, rather
// than a generic "2 correct" shade.
function mixPlayerColors(names){
  if (names.length === 0) return RING_IDLE_COLOR;
  const sum = names.reduce((acc, name) => {
    const c = hexToRgb(META[name].color);
    acc.r += c.r; acc.g += c.g; acc.b += c.b;
    return acc;
  }, { r: 0, g: 0, b: 0 });
  const n = names.length;
  return rgbToHex(sum.r / n, sum.g / n, sum.b / n);
}

function polarPoint(angleDeg, radius){
  const rad = angleDeg * Math.PI / 180;
  return [CX + radius * Math.cos(rad), CY + radius * Math.sin(rad)];
}

const ringGroup = document.createElementNS(NS, "g");
svg.appendChild(ringGroup);

const N_FIX = FIXTURES.length;
const arcPerBar = (2 * Math.PI * RING_INNER) / N_FIX;
const barWidth = Math.max(1.2, Math.min(6, arcPerBar * 0.65));

const barEls = [];
for (let i = 0; i < N_FIX; i++){
  const angle = -90 + (i / N_FIX) * 360;
  const [x1, y1] = polarPoint(angle, RING_INNER);
  const [x2, y2] = polarPoint(angle, RING_INNER + RING_BASE_LEN);
  const bar = document.createElementNS(NS, "line");
  bar.setAttribute("class", "count-bar");
  bar.setAttribute("x1", x1); bar.setAttribute("y1", y1);
  bar.setAttribute("x2", x2); bar.setAttribute("y2", y2);
  bar.setAttribute("stroke", RING_IDLE_COLOR);
  bar.setAttribute("stroke-width", barWidth);
  bar.setAttribute("stroke-linecap", "round");
  bar.style.opacity = 0.4;
  ringGroup.appendChild(bar);
  barEls.push(bar);
}

function setBarLit(i){
  const bar = barEls[i];
  const angle = -90 + (i / N_FIX) * 360;
  const correctNames = effectiveCorrect(FIXTURES[i]);
  const count = correctNames.length;
  const len = RING_BASE_LEN + (RING_MAX_LEN - RING_BASE_LEN) * (count / PLAYERS.length);
  const [x2, y2] = polarPoint(angle, RING_INNER + len);
  bar.setAttribute("x2", x2); bar.setAttribute("y2", y2);
  bar.setAttribute("stroke", mixPlayerColors(correctNames));
  bar.style.opacity = 1;
}

function setBarUnlit(i){
  const bar = barEls[i];
  const angle = -90 + (i / N_FIX) * 360;
  const [x2, y2] = polarPoint(angle, RING_INNER + RING_BASE_LEN);
  bar.setAttribute("x2", x2); bar.setAttribute("y2", y2);
  bar.setAttribute("stroke", RING_IDLE_COLOR);
  bar.style.opacity = 0.4;
}

// Tracks how far the ring is currently lit, so a normal step forward only
// touches the one newly-revealed bar instead of re-writing all N of them
// every 300ms. Stepping backward (Prev, or looping back to the start)
// still only touches the bars whose state actually changes. Setting this
// to -1 forces the next call to relight everything from scratch, which is
// used deliberately when muting/unmuting a player changes history's colours.
let ringLitUpTo = -1;

function updateRing(currentIdx){
  if (currentIdx > ringLitUpTo){
    for (let i = ringLitUpTo + 1; i <= currentIdx; i++) setBarLit(i);
  } else if (currentIdx < ringLitUpTo){
    for (let i = currentIdx + 1; i <= ringLitUpTo; i++) setBarUnlit(i);
  }
  ringLitUpTo = currentIdx;
}

// ── Audio ────────────────────────────────────────────────────────────────
let audioReady = false;
let masterBus, analyser, synths = {};

function showAudioNotice(msg){
  readoutEl.innerHTML = `<div class="fx-line" style="color:#ff8f8f">${msg}</div>`;
}

function initAudio(){
  if (audioReady) return true;
  if (typeof Tone === "undefined"){
    showAudioNotice("⚠ Sound engine failed to load — check your connection, then reload the page.");
    return false;
  }
  masterBus = new Tone.Gain(0.8).toDestination();
  // Smaller analyser buffer = less work per animation frame.
  analyser = new Tone.Analyser("waveform", 256);
  masterBus.connect(analyser);
  PLAYERS.forEach(name => {
    // Plain Tone.Synth: one oscillator + one envelope, no filter or filter
    // envelope to compute. MonoSynth (osc + filter + 2 envelope generators)
    // times 6 simultaneous voices was too much real-time DSP for weaker
    // phones' audio threads, which reads as crackly distortion regardless
    // of volume/gain-staging. Triangle wave keeps some harmonic character
    // (more "synth" than a pure sine) without sawtooth's heavier harmonic
    // content, which also helps on cheap speakers.
    synths[name] = new Tone.Synth({
      oscillator: { type: "triangle" },
      envelope: { attack: 0.005, decay: 0.15, sustain: 0.3, release: 0.3 },
      volume: -8,
    }).connect(masterBus);
  });
  audioReady = true;
  return true;
}

async function unlockAudio(){
  // Nudge iOS's audio session into "playback" category via a silent HTML
  // media element — this is what makes Web Audio (Tone.js) audible even
  // when the phone's hardware mute switch is flipped to silent.
  const unlockEl = document.getElementById("unlockEl");
  if (unlockEl){ try { await unlockEl.play(); } catch(e) {} }

  if (!initAudio()) return false;
  await Tone.start();
  if (Tone.context.state !== "running"){
    showAudioNotice("⚠ Audio is still locked on this device — check your mute switch/volume, then tap Play again.");
    return false;
  }
  return true;
}

// ── Oscilloscope ─────────────────────────────────────────────────────────
const scopeCanvas = document.getElementById("scope");
const scopeCtx = scopeCanvas.getContext("2d");
function drawScope(){
  requestAnimationFrame(drawScope);
  const w = scopeCanvas.width, h = scopeCanvas.height;
  scopeCtx.clearRect(0, 0, w, h);
  scopeCtx.beginPath();
  let values = null;
  if (audioReady && playing){
    try { values = analyser.getValue(); } catch(e) { values = null; }
  }
  if (values){
    for (let i = 0; i < values.length; i++){
      const x = (i / values.length) * w;
      const y = (values[i] * 0.5 + 0.5) * h;
      i === 0 ? scopeCtx.moveTo(x, y) : scopeCtx.lineTo(x, y);
    }
  } else {
    scopeCtx.moveTo(0, h/2); scopeCtx.lineTo(w, h/2);
  }
  scopeCtx.strokeStyle = "#f4b942";
  scopeCtx.lineWidth = 1.5;
  scopeCtx.stroke();
}
requestAnimationFrame(drawScope);

// ── Playback state ─────────────────────────────────────────────────────
const STEP_MS = 400;   // fixed tempo
let idx = -1;
let playing = false;
let timer = null;

const playBtn = document.getElementById("playBtn");
const nextBtnEl = document.getElementById("nextBtn");
const loopEl = document.getElementById("loop");
const counterEl = document.getElementById("counter");
const readoutEl = document.getElementById("readout");

function clearActive(){
  Object.values(nodeEls).forEach(n => n.classList.remove("active"));
  Object.values(wireEls).forEach(w => { w.classList.remove("active"); w.style.stroke = ""; });
}

function renderFixture(i){
  clearActive();
  const fx = FIXTURES[i];
  const correct = effectiveCorrect(fx);
  const correctIdxs = correct.map(n => PLAYERS.indexOf(n)).sort((a,b)=>a-b);

  correct.forEach(name => { nodeEls[name] && nodeEls[name].classList.add("active"); });

  for (let a = 0; a < correctIdxs.length; a++){
    for (let b = a + 1; b < correctIdxs.length; b++){
      const key = `${correctIdxs[a]}-${correctIdxs[b]}`;
      const line = wireEls[key];
      if (line){ line.style.stroke = line.dataset.grad; line.classList.add("active"); }
    }
  }

  if (audioReady){
    // Hold + release needs to comfortably fit inside STEP_MS, or a player
    // who's correct several fixtures in a row never actually goes silent
    // between notes — that's what was causing the buildup/distortion.
    const dur = (STEP_MS / 1000) * 0.9;
    correct.forEach(name => { synths[name].triggerAttackRelease(META[name].note, dur); });
  }

  updateReadout(fx, correct);
  updateRing(i);
  counterEl.textContent = `${i + 1} / ${FIXTURES.length}`;
}

function updateReadout(fx, correct){
  const resultLabel = fx.result === "H" ? `${fx.home} win`
                     : fx.result === "A" ? `${fx.away} win`
                     : fx.result === "D" ? "Draw"
                     : "Not yet played";
  let chipsHtml = "";
  if (!fx.result){
    chipsHtml = `<div class="chips"><span class="chip silence">— awaiting a result —</span></div>`;
  } else if (correct.length === 0){
    chipsHtml = `<div class="chips"><span class="chip silence">— total silence, nobody called it —</span></div>`;
  } else {
    const dots = correct.map(name => {
      const cls = correct.length === PLAYERS.length ? "chip full" : "chip";
      return `<span class="${cls}"><span class="dot" style="background:${META[name].color}"></span>${name}</span>`;
    }).join("");
    const prefix = correct.length === PLAYERS.length ? `<span class="chip full">🎉 FULL CHORD</span>` : "";
    chipsHtml = `<div class="chips">${prefix}${dots}</div>`;
  }
  readoutEl.innerHTML = `<div class="fx-line">Fixture <b>#${fx.no}</b> · ${fx.roundName} ·
    <b>${fx.homeFull}</b> (${fx.home}) v <b>${fx.awayFull}</b> (${fx.away}) → <b>${resultLabel}</b></div>
    ${chipsHtml}`;
}

function stepTo(newIdx){
  if (newIdx >= FIXTURES.length){
    if (loopEl.checked) newIdx = 0; else { pause(); return; }
  }
  if (newIdx < 0) newIdx = FIXTURES.length - 1;
  idx = newIdx;
  renderFixture(idx);
}

function tick(){ stepTo(idx + 1); }

async function play(){
  const ok = await unlockAudio();
  if (!ok) return;
  if (idx === -1) stepTo(0);
  playing = true;
  playBtn.textContent = "⏸ Pause";
  clearInterval(timer);
  timer = setInterval(tick, STEP_MS);
}

function pause(){
  playing = false;
  playBtn.textContent = "▶ Play";
  clearInterval(timer);
}

playBtn.addEventListener("click", () => { playing ? pause() : play(); });
nextBtnEl.addEventListener("click", async () => { const ok = await unlockAudio(); if (ok) stepTo(idx + 1); });
document.getElementById("prevBtn").addEventListener("click", async () => { const ok = await unlockAudio(); if (ok) stepTo(idx - 1); });

counterEl.textContent = `0 / ${FIXTURES.length}`;
</script>
</body>
</html>
